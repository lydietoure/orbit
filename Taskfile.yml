version: "3"

# Load .env (gitignored) for local-only knobs like ORBIT_HOME or
# ORBIT_VERBOSE. CLI overrides (`task smoke ORBIT_HOME=...`) win.
# ORBIT_HOME has NO default — it must come from .env or the CLI.
# Loaded vars are exported to the child process automatically, so
# the smoke task doesn't need its own `env:` block.
dotenv: ['.env']

includes:
  # Keep a Taskfile.local.yml for local-only tasks that you do not want checked into git
  # This file is .gitignored by default
  local:
    taskfile: ./Taskfile.local.yml
    optional: true
    flatten: true

# Binary name differs by OS: Windows needs the .exe suffix, everything
# else is bare `orbit`. {{OS}} is go-task's runtime.GOOS value.
vars:
  ORBIT_OUT_BINARY: '{{if eq OS "windows"}}orbit.exe{{else}}orbit{{end}}'

tasks:

  build:
    desc: "Build the orbit binary"
    vars:
      # Single source of truth: the nearest git tag. Yields e.g. "v0.1.0"
      # on a tagged commit, "v0.1.0-5-g1a2b3c4" further along, a bare SHA
      # if untagged, and a "-dirty" suffix for uncommitted changes.
      VERSION:
        # Note that this will always run in this directory (repository root)
        # So the `git describe` command should always work
        sh: git describe --tags --always --dirty || echo "dev"
      LDFLAGS: >-
        -X github.com/lydietoure/orbit/internal/cli.version={{.VERSION}}
    cmds:
      - mkdir -p dist
      - go build -ldflags "{{.LDFLAGS}}" -o dist/{{.ORBIT_OUT_BINARY}} ./cmd/orbit

  test:
    desc: "Run all tests"
    cmd: go test ./...

  lint:
    desc: "Run linting checks"
    cmd: go vet ./...

  check:
    desc: "Run all checks (lint and tests)"
    cmds:
      - task: lint
      - task: test

  clean:
    desc: "Remove build artifacts"
    cmd: rm -rf dist/

  # Cross-platform release build (mirrors .github/workflows/release.yml).
  # Produces per-target binaries under dist/ for local verification before
  # pushing a tag. Set VERSION to override the embedded version string.
  release:
    desc: |
      Build release binaries for all targets into dist/.
      Override the version with VERSION, e.g.:
        task release VERSION=0.1.0
    vars:
      VERSION: '{{.VERSION | default "dev"}}'
      LDFLAGS: >-
        -s -w -X github.com/lydietoure/orbit/internal/cli.version={{.VERSION}}
      TARGETS:
        - linux/amd64
        - darwin/amd64
        - windows/amd64
        - windows/arm64
    env:
      CGO_ENABLED: "0"
    cmds:
      - mkdir -p dist
      - for: { var: TARGETS }
        cmd: |
          GOOS={{splitList "/" .ITEM | first}} GOARCH={{splitList "/" .ITEM | last}} \
          go build -trimpath -ldflags "{{.LDFLAGS}}" \
            -o dist/orbit-{{.VERSION}}-{{splitList "/" .ITEM | first}}-{{splitList "/" .ITEM | last}}{{if eq (splitList "/" .ITEM | first) "windows"}}.exe{{end}} \
            ./cmd/orbit

  genschema:
    desc: "Run the genschema tool"
    cmd: go run -tags ci ./cmd/genschema/ {{.CLI_ARGS}}

  validate0000:
    desc: "Validate that 0000_v0.1.0.sql matches the canonical v0.1.0 schema"
    cmd: |
      bash -c '
        RELEASED_RAW="$(mktemp)"
        trap "rm -f \"$RELEASED_RAW\"" EXIT
        echo "Fetching canonical v0.1.0 schema from git..."
        git show v0.1.0:internal/db/schema.sql > "$RELEASED_RAW"
        bash ./scripts/validate_schema.sh 0000 "$RELEASED_RAW"
      '

  # Live run
  run:
    desc: |
      Run orbit from source.
      Pass arguments to orbit after `--`, e.g.:
        task run -- init
        task run -- -v init
    cmds:
      - go run ./cmd/orbit {{.CLI_ARGS}}

  # Smoke testing: 

  smoke:
    desc: |
      Run orbit against ORBIT_HOME (set in .env or on CLI).
      Pass arguments to orbit after `--`, e.g.:
        task smoke -- init
        task smoke -- -v init
        task smoke ORBIT_HOME=.local/foo -- init

      ORBIT_HOME is NOT pre-created — orbit owns its own home dir
      lifecycle (created by `init`, removed by `destroy`). That keeps
      smoke runs honest about the "not initialized" error path.
    requires:
      vars: [ORBIT_HOME]
    cmds:
      - go run ./cmd/orbit {{.CLI_ARGS}}

  smoke:clean:
    desc: "Remove the smoke ORBIT_HOME directory entirely (orbit init will recreate it)"
    requires:
      vars: [ORBIT_HOME]
    cmds:
      - rm -rf "{{.ORBIT_HOME}}"

  smoke:reset:
    desc: "Empty ORBIT_HOME and re-run `orbit init` (forwards extra args after --)"
    cmds:
      - task: smoke:clean
      - task: smoke
        vars: { CLI_ARGS: 'init {{.CLI_ARGS}}' }
