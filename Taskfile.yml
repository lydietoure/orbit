version: "3"

tasks:

  build:
    desc: "Build the orbit binary"
    cmd: go build -o orbit ./cmd/orbit

  test:
    desc: "Run all tests"
    cmd: go test ./...

  lint:
    desc: "Run linting checks"
    cmd: go vet ./...

  check:
    desc: "Run all checks (lint and tests)"
    cmds:
      - task: lint
      - task: test

  clean:
    desc: "Remove build artifacts"
    cmd: rm -f orbit orbit.exe
