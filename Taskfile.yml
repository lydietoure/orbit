version: "3"

# Load .env (gitignored) for local-only knobs like SMOKE_HOME or
# ORBIT_VERBOSE. CLI overrides (`task smoke SMOKE_HOME=...`) win.
# SMOKE_HOME has NO default — it must come from .env or the CLI.
dotenv: ['.env']

tasks:

  build:
    desc: "Build the orbit binary"
    vars:
      VERSION:
        sh: go run ./cmd/version
      LDFLAGS: >-
        -X github.com/lydietoure/orbit/internal/version.Base={{.VERSION}}
    cmds:
      - mkdir -p dist
      - go build -ldflags "{{.LDFLAGS}}" -o dist/orbit.exe ./cmd/orbit

  test:
    desc: "Run all tests"
    cmd: go test ./...

  lint:
    desc: "Run linting checks"
    cmd: go vet ./...

  check:
    desc: "Run all checks (lint and tests)"
    cmds:
      - task: lint
      - task: test

  clean:
    desc: "Remove build artifacts"
    cmd: rm -rf dist/

  smoke:
    desc: |
      Run orbit against ORBIT_HOME=$SMOKE_HOME (set in .env or on CLI).
      Pass arguments to orbit after `--`, e.g.:
        task smoke -- init
        task smoke -- -v init
        task smoke SMOKE_HOME=.local/foo -- init

      ORBIT_HOME is NOT pre-created — orbit owns its own home dir
      lifecycle (created by `init`, removed by `destroy`). That keeps
      smoke runs honest about the "not initialized" error path.
    requires:
      vars: [SMOKE_HOME]
    env:
      ORBIT_HOME: '{{.SMOKE_HOME}}'
    cmds:
      - go run ./cmd/orbit {{.CLI_ARGS}}

  smoke:clean:
    desc: "Remove the smoke test ORBIT_HOME directory entirely (orbit init will recreate it)"
    requires:
      vars: [SMOKE_HOME]
    cmds:
      - rm -rf "{{.SMOKE_HOME}}"

  smoke:reset:
    desc: "Empty SMOKE_HOME and re-run `orbit init` (forwards extra args after --)"
    cmds:
      - task: smoke:clean
      - task: smoke
        vars: { CLI_ARGS: 'init {{.CLI_ARGS}}' }
