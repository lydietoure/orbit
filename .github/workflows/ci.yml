name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 5 * *'  # every 5th of the Month at 06:00 UTC 

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      # Check that the original migration file 0000_v0.1.0.sql matches the canonical v0.1.0 schema.
      - name: Validate 0000_v0.1.0.sql
        run: bash ./scripts/validate_0000_schema.sh

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

  # Cross-compile every release target so a build break on any
  # GOOS/GOARCH is caught at PR time rather than during a tag release.
  # Keep this matrix in sync with .github/workflows/release.yml.
  cross-build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          CGO_ENABLED: "0" # pure-Go sqlite driver; keeps cross-compiles static
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -o /dev/null ./cmd/orbit

  # On every merge to main: generate a normalised schema snapshot from all
  # current migration files and upload it as a GitHub Actions artifact.
  # PRs use this snapshot to verify that no already-merged migration was edited.
  publish-schema:
    name: Publish schema snapshot
    needs: check
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build genschema
        run: go build -tags ci -o /tmp/genschema ./cmd/genschema/

      - name: Dump schema snapshot
        run: |
          MIGRATIONS_DIR=internal/db/migrations
          mapfile -t FILES < <(ls "$MIGRATIONS_DIR"/*.sql | xargs -I{} basename {} | sort -t_ -k1,1n)
          MIGRATIONS_ARG="$(IFS=,; echo "${FILES[*]}")"
          MAX_VERSION=$(printf '%s\n' "${FILES[@]}" | sed 's/^\([0-9]*\)_.*/\1/' | sort -n | tail -1 | sed 's/^0*//')
          /tmp/genschema -migrations "$MIGRATIONS_ARG" -out schema_main.sql
          echo "$MAX_VERSION" > schema_main.version
          echo "Snapshot covers migrations 0..$MAX_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: schema-main
          path: |
            schema_main.sql
            schema_main.version
          retention-days: 90
          overwrite: true

  # On every PR: download the latest schema snapshot from main and verify
  # that applying the PR's migrations up to that version produces the same
  # output. Fails if any already-merged migration was edited on this branch.
  validate-schema-compat:
    name: Validate schema compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download schema snapshot from main
        id: download
        uses: dawidd6/action-download-artifact@v6
        with:
          name: schema-main
          branch: main
          workflow: ci.yml
          path: /tmp/schema-main
          if_no_artifact_found: warn
        continue-on-error: true  # graceful on first PR before any main snapshot exists

      - name: Validate against main snapshot
        if: steps.download.outcome == 'success'
        run: |
          MAIN_VERSION=$(cat /tmp/schema-main/schema_main.version)
          bash ./scripts/validate_schema.sh "$MAIN_VERSION" /tmp/schema-main/schema_main.sql
