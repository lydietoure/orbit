name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-tags: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        run: go build ./...

      # Check that the original migration file 0000_v0.1.0.sql matches the canonical v0.1.0 schema.
      - name: Validate 0000_v0.1.0.sql
        run: |
          echo "Fetching canonical v0.1.0 schema from git..."
          RELEASED_RAW="$(mktemp)"
          trap "rm -f '$RELEASED_RAW'" EXIT
          git show v0.1.0:internal/db/schema.sql > "$RELEASED_RAW"
          bash ./scripts/validate_schema.sh 0000 "$RELEASED_RAW"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: |
          echo "Generating the schema..."
          go run -tags ci ./cmd/genschema/
          go test ./... -race -coverprofile=coverage.out

  # Cross-compile every release target so a build break on any
  # GOOS/GOARCH is caught at PR time rather than during a tag release.
  # Keep this matrix in sync with .github/workflows/release.yml.
  cross-build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          CGO_ENABLED: "0" # pure-Go sqlite driver; keeps cross-compiles static
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -o /dev/null ./cmd/orbit
